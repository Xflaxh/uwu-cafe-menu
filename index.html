<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UwU Cafe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>UwU Cafe</h1>

<button onclick="applyDiscount(10)">10% Discount</button>
<button onclick="customDiscount()">Custom Discount</button>

<div id="menu">
<button onclick="addItem('Booba Tea',150)">Booba Tea</button>
<button onclick="addItem('Doki Doki Pancakes',200)">Doki Doki Pancakes</button>
<button onclick="addItem('Om-Nom Omurice',350)">Om-Nom Omurice</button>
</div>

<h2>Your Order</h2>
<div id="cartItems"></div>

<p>Subtotal: <span id="subtotal">$0</span></p>
<p>Discount: <span id="discount">$0</span></p>
<p>Total: <span id="total">$0</span></p>

<script src="script.js"></script>
</body>
</html>
