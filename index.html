<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UwU Café</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>💖 UwU Café</h1>

<div class="buttons">
<button onclick="applyDiscount(10)">10% Discount</button>
<button onclick="customDiscount()">Custom Discount</button>
</div>

<div id="menu"></div>

<div class="order">
<h2>Your Order</h2>
<div id="cart"></div>
<p>Subtotal: <span id="subtotal">$0</span></p>
<p>Discount: <span id="discount">$0</span></p>
<p>Total: <span id="total">$0</span></p>

<button onclick="copyTotal()">Copy Price</button>
<button onclick="clearCart()">Clear Cart</button>
</div>

<script src="script.js"></script>
</body>
</html>
